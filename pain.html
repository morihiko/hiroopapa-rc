あえず休む。普段もできる限りテーピングしておいたほうが良いとのこと。\', \'cause\': \'シンスプリント＋軽度の疲労骨折\n身体の強度に対して、追い込み過ぎ。また、おそらくマッサージで患部を強く押されたことも影響。\n・怪我した週は合計100km\n・怪我する前日にパークラン5kmTT＋ジョグ10km\n・怪我した当日はハーフマラソンでレースペース走+ ジョグ10km\', \'lesson\': \'特に、何かしら少しでも違和感がある際は、追い込みすぎない。\', \'goods\': \'キネシオテープ\n脛サポーター\', \'shop\': \'\', \'clinic\': \'東京城南整形外科（MRI）\', \'drug\': \'ロキソニンを渡そうかと医者に言われたが断った\'}], \'つま先\': [{\'reporter\': \'安田\', \'display_part\': \'つま先・指\', \'symptom1\': \'チクチクする（針で刺すような）\', \'symptom2\': \'走っている途中で痛む\', \'remedy\': \'走る前に皮膚保護クリームを塗る。通気性の良い和紙素材のソックスを履く。\', \'cause\': \'フルマラソン中に水ぶくれができた。\', \'lesson\': \'予防が有効。\', \'goods\': \'J-1\', \'shop\': \'Amazon\', \'clinic\': \'\', \'drug\': \'\'}, {\'reporter\': \'森岡\', \'display_part\': \'つま先・指\', \'symptom1\': \'鈍い痛み\', \'symptom2\': \'常に痛む\', \'remedy\': \'医師から処方された湿布を貼付\', \'cause\': \'小さすぎるシューズを履いて、長距離走った\', \'lesson\': \'ちゃんと採寸して、適したものを履く\', \'goods\': \'\', \'shop\': \'\', \'clinic\': \'友仁クリニック（日本橋）\', \'drug\': \'ジクトルテープ75mg\'}, {\'reporter\': \'野村\', \'display_part\': \'つま先・指\', \'symptom1\': \'鋭い痛み\', \'symptom2\': \'着地時に痛む\', \'remedy\': \'フルマラソン本番中に激痛。急遽ソックスを脱いで裸足でシューズを履きレース継続。1週間程度痛みが残る。\', \'cause\': \'レース前日に購入した5本指ソックスが自分の足指の体型（人差し足指が一番長い）に合っていなかった。\', \'lesson\': \'特にソックスは練習で履き慣れたものを本番で使う。5本指ソックス使用時は足指の体型とソックス形状が合っているか今一度確認する。\', \'goods\': \'\', \'shop\': \'\', \'clinic\': \'\', \'drug\': \'ロキソニン\'}], \'▼その他 肩 腕 腹部 その他\': [{\'reporter\': \'緒方\', \'display_part\': \'▼その他 肩 腕 腹部 その他\', \'symptom1\': \'鈍い痛み\', \'symptom2\': \'常に痛む\', \'remedy\': \'服薬、ラン後のアイシング\', \'cause\': \'関節の炎症\', \'lesson\': \'痛みが出るときは早めに整形外科にかかりましょう\', \'goods\': \'\', \'shop\': \'\', \'clinic\': \'整形外科\', \'drug\': \'ロルノキシカム（ロキソニン由来の消炎鎮痛剤）\'}, {\'reporter\': \'まい\', \'display_part\': \'▼その他 肩 腕 腹部 その他\', \'symptom1\': \'きしむ感じ\', \'symptom2\': \'特定の動きで痛む\', \'remedy\': \'腕を上げると肩に痛みがでていた。原因究明のため整骨院でチェックしてもらう。伊藤超短波のハイボルトで肩周りの筋肉を動かす。トムソンテーブルで脛骨と腰椎の矯正、セルフケアとして巻き肩にならないよう姿勢の維持する。肩周りのストレッチを朝晩する。減量する。\', \'cause\': \'体重5kg/月の増加により腹が出て、バランスするため猫背になっていた。肩甲骨の筋肉（棘下筋と小円筋）の肩側の付着部分が痛みの発生源であることを見つけた。\', \'lesson\': \'直ぐに検査せず、自己流のストレッチを2週間続けるも改善無く、すぐ整骨院行けば良かった。2週間行ったワークは、遠くにあるものを掴もうとする様なイメージでインナー筋を伸ばすストレッチをしていました。結果、アウター筋が硬いまま、姿勢を悪化させたままでした。\', \'goods\': \'伊藤超短波ハイボルト、トムソンテーブル（ベッド）\', \'shop\': \'\', \'clinic\': \'つくも接骨院（千葉一宮町）\', \'drug\': \'\'}], \'▼足部\': [{\'reporter\': \'安田\', \'display_part\': \'▼足部\', \'symptom1\': \'重い痛み\', \'symptom2\': \'常に痛む\', \'remedy\': \'マイクロカレント療法\', \'cause\': \'疲労・捻挫など\', \'lesson\': \'痛みがあるときはマイクロカレントで楽になったり治りが早くなると感じてます。元々体に流れている生体電流に似た微弱電流を流して細胞の修復を促進するそうです。\', \'goods\': \'オムロンV-F080\', \'shop\': \'Amazonなど\', \'clinic\': \'\', \'drug\': \'\'}], \'ふくらはぎ\': [{\'reporter\': \'緒方\', \'display_part\': \'ふくらはぎ\', \'symptom1\': \'鈍い痛み\', \'symptom2\': \'特定の動きで痛む\', \'remedy\': \'準備運動、アクティブストレッチをしっかり。起きてしまったら、RICEを必ず実施。コンプレッションタイツを履いて圧力をしっかりかける（RICEのC）。またテーピングでの固定で悪化を防ぐ。ある程度治ってきたらキネシオロジーテープに切り替え。張りや痛みがあるときは炎症鎮静成分がある湿布を貼る。マイクロカレントを朝晩かける。あとは最初の２週間くらいはとにかく安静に、そのあとも完治するまでは絶対に無理をしない。\', \'cause\': \'肉離れ。運動会で急に出力を上げたときに発生しました。\', \'lesson\': \'オーバーワーク、準備運動不足。重症だと普通に歩けるようになるまで6週間、走れるようになるまで3ヶ月かかります。起きてからでは遅いので気をつけましょう。\', \'goods\': \'キネシオロジーテープ\nオムロンV-F080 \nメディキュット医療用（圧迫タイツ）\', \'shop\': \'Amazon、ドラッグストア\', \'clinic\': \'\', \'drug\': \'\'}]};

// 部位アイコン
var partIcons = {
  '足部': '🦶',
  '膝': '🦵',
  '太もも': '🦵',
  'ふくらはぎ': '🦵',
  'すね': '🦵',
  'アキレス腱': '🦵',
  'つま先': '👆',
  '腰': '🫀',
  '肩・その他': '🤷',
};

function doRender() {
  var container = document.getElementById('cards-container');
  var filterRow = document.getElementById('filter-row');
  var allParts = Object.keys(allData);
  
  // フィルターボタン生成
  var filterHTML = '<button class="filter-btn active" data-f="all" onclick="doFilter(this)">すべて</button>';
  allParts.forEach(function(part) {
    filterHTML += '<button class="filter-btn" data-f="' + part + '" onclick="doFilter(this)">' + (partIcons[part] || '') + ' ' + part + '</button>';
  });
  filterRow.innerHTML = filterHTML;
  
  // カード生成
  var cardHTML = '';
  Object.keys(allData).forEach(function(part) {
    allData[part].forEach(function(item) {
      var goods = [], clinic = [], drug = [];
      if(item.goods) goods.push(item.goods);
      if(item.shop) goods.push('🛍 ' + item.shop);
      if(item.clinic) clinic.push('🏥 ' + item.clinic);
      if(item.drug) drug.push('💊 ' + item.drug);
      
      var goodsHTML = '';
      goods.forEach(function(g) { goodsHTML += '<span class="goods-tag">🛍 ' + g + '</span>'; });
      clinic.forEach(function(c) { goodsHTML += '<span class="clinic-tag">' + c + '</span>'; });
      drug.forEach(function(d) { goodsHTML += '<span class="drug-tag">' + d + '</span>'; });
      
      cardHTML += '<div class="card visible" data-p="' + part + '">' +
        '<div class="card-top">' +
        '<span class="part-badge">' + (partIcons[part] || '') + ' ' + item.display_part + '</span>' +
        '<span class="reporter">' + item.reporter + '</span>' +
        '</div>' +
        '<div class="symptom-row">' +
        '<span class="s-badge">' + item.symptom1 + '</span>' +
        '<span class="s-badge">' + item.symptom2 + '</span>' +
        '</div>' +
        '<div class="section-title">原因・対応</div>' +
        '<div class="body-text">' + item.cause + '。' + item.remedy + '</div>' +
        '<div class="lesson-box">' + item.lesson + '</div>' +
        '<div class="goods-row">' + goodsHTML + '</div>' +
        '</div>';
    });
  });
  container.innerHTML = cardHTML;
}

window.doFilter = function(btn) {
  var cards = document.querySelectorAll('.card');
  var filter = btn.getAttribute('data-f');
  
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  
  cards.forEach(function(card) {
    if(filter === 'all' || card.getAttribute('data-p') === filter) {
      card.classList.add('visible');
    } else {
      card.classList.remove('visible');
    }
  });
};

doRender();
</script>
