<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初心者向けフルマラソンの知恵 — かすみがうら 2025 — 広尾親父RC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#0d3d20;display:flex;flex-direction:column}
header{flex-shrink:0;background:rgba(13,61,32,0.97);backdrop-filter:blur(8px);padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.h-inner{display:flex;align-items:center;gap:10px;max-width:720px;margin:0 auto;height:50px}
.h-back{color:rgba(255,255,255,0.8);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:4px;padding:6px 0;flex-shrink:0}
.h-back:active{opacity:.7}
.h-title{color:white;font-size:13px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center}
.h-logo{flex-shrink:0}
iframe{flex:1;width:100%;border:none;background:white}
</style>
<style id="gold-theme">
/* 大理石背景対応 */
body{background:transparent!important}
/* ヘッダー金線 */
header{border-bottom:1px solid rgba(201,162,39,0.4)!important}
/* カード金縁 */
.card{border:1px solid rgba(201,162,39,0.2)!important;border-top:2px solid rgba(201,162,39,0.5)!important;background:rgba(255,255,255,0.97)!important}
/* セクション見出し金色 */
.divider{color:rgba(201,162,39,0.9)!important;border-left:2px solid rgba(201,162,39,0.6);padding-left:8px!important}
/* ボタン金縁 */
.btn{border:1px solid rgba(201,162,39,0.25)!important}
/* ストーリーカード金縁 */
.story-card{border:1px solid rgba(201,162,39,0.2)!important;border-top:2px solid rgba(201,162,39,0.45)!important}
/* ページタイトル */
.page-title{text-shadow:0 2px 12px rgba(0,0,0,0.5)}
/* 認証カード金縁 */
#auth-overlay>div{border:1px solid rgba(201,162,39,0.3)!important}
/* pain.html カード */
.card.visible{border-left:4px solid #c9a227!important}
/* フィルターボタン */
.filter-btn.active,.filter-btn:hover{background:#1b5e35;border-color:rgba(201,162,39,0.5)!important}
</style>
</head>
<body>
<div id="bg" aria-hidden="true" style="position:fixed;inset:0;z-index:-1;overflow:hidden">
<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs>
<filter id="mf" color-interpolation-filters="sRGB">
  <feTurbulence type="turbulence" baseFrequency="0.009 0.007" numOctaves="5" seed="11" result="t"/>
  <feColorMatrix type="matrix" values="0.25 0.1 0 0 0.04  0.25 0.1 0 0 0.16  0.25 0.1 0 0 0.07  0 0 0 0.5 0" in="t" result="c"/>
</filter>
<radialGradient id="rg" cx="46%" cy="26%" r="65%">
  <stop offset="0%" stop-color="#1e5c2d"/>
  <stop offset="50%" stop-color="#112b19"/>
  <stop offset="100%" stop-color="#050d07"/>
</radialGradient>
<radialGradient id="vig" cx="50%" cy="50%" r="75%">
  <stop offset="25%" stop-color="rgba(0,0,0,0)"/>
  <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
</radialGradient>
</defs>
<rect width="100%" height="100%" fill="url(#rg)"/>
<rect width="100%" height="100%" fill="#163520" filter="url(#mf)"/>
<rect width="100%" height="100%" fill="url(#vig)"/>
</svg>
</div>


<header>
  <div class="h-inner">
    <a href="./stories.html" class="h-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      奮闘記一覧
    </a>
    <div class="h-title">🏃 フルマラソン</div>
    <div class="h-logo">
      <a href="./index.html" style="display:inline-block;cursor:pointer;text-decoration:none;">
        <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
          <path d="M26 3 L46 10 L46 28 C46 39 36 48 26 50 C16 48 6 39 6 28 L6 10 Z" fill="#e8f5ee" stroke="#1b5e35" stroke-width="2"/>
          <text x="26" y="33" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#1b5e35" text-anchor="middle" letter-spacing="1">HG</text>
        </svg>
      </a>
    </div>
  </div>
</header>

<iframe
  src="https://docs.google.com/document/d/10rNj_wY83d4Ug1EvQTtSS_MUlNVOFwAVLAANZeoau94/preview"
  allow="autoplay"
  title="初心者向けフルマラソンの知恵 — かすみがうら 2025"
></iframe>

<div id="auth-overlay" style="position:fixed;inset:0;background:linear-gradient(160deg,#1b5e35 0%,#0d3d20 100%);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="background:white;border-radius:20px;padding:36px 28px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center">
    <svg width="60" height="60" viewBox="0 0 52 52" fill="none" style="margin-bottom:16px">
      <path d="M26 3 L46 10 L46 28 C46 39 36 48 26 50 C16 48 6 39 6 28 L6 10 Z" fill="#e8f5ee" stroke="#1b5e35" stroke-width="2"/>
      <text x="26" y="33" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#1b5e35" text-anchor="middle" letter-spacing="1">HG</text>
    </svg>
    <div style="font-size:16px;font-weight:700;color:#1b5e35;margin-bottom:4px">広尾親父RC</div>
    <div style="font-size:12px;color:#888;margin-bottom:24px">部員専用ページ</div>
    <input type="password" id="pw-input" placeholder="パスワード" inputmode="numeric" pattern="[0-9]*"
      style="width:100%;padding:12px 14px;border:2px solid #ddd;border-radius:10px;font-size:16px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;margin-bottom:10px">
    <button onclick="checkPw()"
      style="width:100%;padding:12px;background:linear-gradient(135deg,#1b5e35,#0d3d20);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
      入室する
    </button>
    <div id="pw-err" style="display:none;margin-top:10px;font-size:12px;color:#e53935">パスワードが違います</div>
  </div>
</div>
<script>
(function(){
  var PASS='0530', KEY='hg-rc-auth';
  if(sessionStorage.getItem(KEY)==='1') document.getElementById('auth-overlay').style.display='none';
  document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
  window.checkPw=function(){
    if(document.getElementById('pw-input').value===PASS){
      sessionStorage.setItem(KEY,'1');
      document.getElementById('auth-overlay').style.display='none';
    } else {
      document.getElementById('pw-err').style.display='block';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
    }
  };
})();
</script>
</body>
</html>
